<!DOCTYPE html>
<html lang="bg" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Отбори</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 shadow">
    <div class="container">
        <a class="navbar-brand" href="/teams/all">Турнири PRO</a>
        <div class="d-flex">
            <a th:href="@{/teams/all}" class="btn btn-outline-light me-2">Отбори</a>
            <a th:href="@{/tournaments/all}" class="btn btn-outline-light me-3">Турнири</a>
            <a th:href="@{/auth/logout}" class="btn btn-danger">Изход</a>
        </div>
    </div>
</nav>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Регистрирани Отбори</h2>
        <a th:href="@{/teams/add}" class="btn btn-success">+ Създай нов отбор</a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <table class="table table-hover table-striped mb-0">
                <thead class="table-dark">
                <tr>
                    <th>Име на отбора</th>
                    <th>Игра</th>
                    <th th:if="${role == 'ADMIN'}" class="text-end">Действия</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="t : ${teams}">
                    <td class="align-middle fw-bold" th:text="${t.name}"></td>
                    <td class="align-middle"><span class="badge bg-info text-dark" th:text="${t.game}"></span></td>
                    <td th:if="${role == 'ADMIN'}" class="text-end">
                        <form th:action="@{/teams/delete/{id}(id=${t.id})}" method="POST" class="d-inline">
                            <button type="submit" class="btn btn-sm btn-danger">Изтрий</button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(teams)}">
                    <td colspan="3" class="text-center py-4 text-muted">Все още няма добавени отбори.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>

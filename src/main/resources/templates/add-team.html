<!DOCTYPE html>
<html lang="bg" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Добави Отбор</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-success text-white py-3">
                    <h4 class="mb-0">➕ Създай нов отбор</h4>
                </div>
                <div class="card-body p-4">
                    <form th:action="@{/teams/add}" th:method="POST" th:object="${team}">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Име на отбора</label>
                            <input type="text" th:field="*{name}" class="form-control" th:classappend="${#fields.hasErrors('name')} ? 'is-invalid' : ''" />
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-bold">Игра (напр. League of Legends)</label>
                            <input type="text" th:field="*{game}" class="form-control" th:classappend="${#fields.hasErrors('game')} ? 'is-invalid' : ''" />
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('game')}" th:errors="*{game}"></div>
                        </div>
                        <div class="d-flex justify-content-between">
                            <a th:href="@{/teams/all}" class="btn btn-secondary">Отказ</a>
                            <button type="submit" class="btn btn-success px-4">Запази</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>

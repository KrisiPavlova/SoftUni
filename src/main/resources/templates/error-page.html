<!DOCTYPE html>
<html lang="bg" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Грешка</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5 pt-5 text-center">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="alert alert-danger shadow p-5 rounded-4">
                <h1 class="display-1 fw-bold">⚠️</h1>
                <h2 class="mb-4">Възникна бизнес проблем!</h2>
                <p class="lead text-dark fw-bold mb-4" th:text="${errorMessage}"></p>
                <a href="javascript:history.back()" class="btn btn-dark btn-lg">⬅ Върни се назад</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>

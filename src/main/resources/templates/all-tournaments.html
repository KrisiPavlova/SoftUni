<!DOCTYPE html>
<html lang="bg" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Турнири</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 shadow">
    <div class="container">
        <a class="navbar-brand" href="/tournaments/all">Турнири PRO</a>
        <div class="d-flex">
            <a th:href="@{/teams/all}" class="btn btn-outline-light me-2">Отбори</a>
            <a th:href="@{/tournaments/all}" class="btn btn-outline-light me-3">Турнири</a>
            <a th:href="@{/auth/logout}" class="btn btn-danger">Изход</a>
        </div>
    </div>
</nav>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Активни Турнири</h2>
        <a th:href="@{/tournaments/add}" class="btn btn-success">+ Създай нов турнир</a>
    </div>

    <div class="row">
        <div class="col-md-4 mb-4" th:each="t : ${tournaments}">
            <div class="card h-100 shadow-sm border-primary">
                <div class="card-body text-center">
                    <h4 class="card-title text-primary" th:text="${t.title}"></h4>
                    <hr>
                    <p class="text-muted small">ID: <span th:text="${t.id}"></span></p>
                </div>
                <div class="card-footer bg-white text-center border-0 pb-3">
                    <form th:action="@{/tournaments/delete/{id}(id=${t.id})}" method="POST">
                        <button type="submit" class="btn btn-outline-danger btn-sm w-100">🗑️ Изтрий Турнира</button>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-12" th:if="${#lists.isEmpty(tournaments)}">
            <div class="alert alert-secondary text-center py-4">
                Все още няма създадени турнири.
            </div>
        </div>
    </div>
</div>
</body>
</html>

<!DOCTYPE html>
<html lang="bg" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Вход</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow">
                <div class="card-header bg-primary text-white text-center py-3">
                    <h4 class="mb-0">Вход в системата</h4>
                </div>
                <div class="card-body p-4">
                    <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>
                    <form th:action="@{/auth/login}" method="POST">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Потребителско име</label>
                            <input type="text" name="username" class="form-control" required/>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-bold">Парола</label>
                            <input type="password" name="password" class="form-control" required/>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-2">Влез</button>
                    </form>
                    <div class="text-center mt-3">
                        <a th:href="@{/auth/register}" class="text-decoration-none">Нямаш акаунт? Регистрирай се тук.</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
